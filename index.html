<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WinGo Signal Panel</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#08122f;
    color:white;
    padding:15px;
}

.card{
    background:#1d2942;
    border-radius:20px;
    padding:20px;
    margin-bottom:15px;
}

.title{
    text-align:center;
    font-size:30px;
    font-weight:bold;
    margin-bottom:15px;
}

.live{
    text-align:center;
    color:#00ff66;
    margin-bottom:20px;
    font-size:24px;
    font-weight:bold;
}

.row{
    display:flex;
    justify-content:space-between;
    margin:12px 0;
    font-size:22px;
}

.signal{
    margin-top:20px;
    border-radius:20px;
    padding:25px;
    text-align:center;
}

.big{
    background:#16a34a;
}

.small{
    background:#dc2626;
}

.signal-title{
    font-size:24px;
}

.signal-text{
    font-size:60px;
    font-weight:bold;
    margin-top:10px;
}

.confidence{
    font-size:28px;
    margin-top:10px;
}

.history{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:15px;
}

.history-item{
    width:50px;
    height:50px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    font-weight:bold;
}

.history-big{
    background:#16a34a;
}

.history-small{
    background:#dc2626;
}

.status{
    text-align:center;
    margin-top:15px;
    color:#94a3b8;
}
</style>
</head>

<body>

<div class="card">

<div class="title">🔥 WINGO SIGNAL PANEL</div>
<div class="live">● LIVE</div>

<div class="row">
<span>Issue:</span>
<span id="issue">Loading...</span>
</div>

<div class="row">
<span>Countdown:</span>
<span id="countdown">0s</span>
</div>

<div class="row">
<span>Latest Number:</span>
<span id="latestNumber">-</span>
</div>

<div class="row">
<span>Latest Result:</span>
<span id="latestResult">-</span>
</div>

<div id="signalBox" class="signal big">
<div class="signal-title">NEXT SIGNAL</div>
<div class="signal-text" id="prediction">BIG</div>
<div class="confidence" id="confidence">78%</div>
</div>

</div>

<div class="card">
<h1>History</h1>
<div class="history" id="history"></div>
</div>

<div class="status" id="status">
Connecting...
</div>

<script>

const HISTORY_API = "https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json";
const ISSUE_API = "https://pakclub10.com/webapi/kv/issue/WinGo_30S";

function convertBigSmall(number){
    return number >= 5 ? 'BIG' : 'SMALL';
}

function setStatus(text){
    document.getElementById('status').innerText = text;
}

function predict(history){

    const last3 = history.slice(0,3);

    let big = 0;
    let small = 0;

    last3.forEach(x=>{
        if(x === 'BIG') big++;
        else small++;
    });

    if(big >= 2){
        return {
            signal:'SMALL',
            confidence:'82%'
        };
    }

    if(small >= 2){
        return {
            signal:'BIG',
            confidence:'82%'
        };
    }

    return {
        signal:Math.random() > 0.5 ? 'BIG' : 'SMALL',
        confidence:'70%'
    };
}

async function fetchJSON(url){

    const response = await fetch(url, {
        method:'GET',
        headers:{
            'Accept':'application/json'
        }
    });

    return await response.json();
}

async function loadData(){

    try{

        setStatus('Fetching live data...');

        // ISSUE
        const issueData = await fetchJSON(ISSUE_API);

        document.getElementById('issue').innerText = issueData.data.issueNumber;

        document.getElementById('countdown').innerText = issueData.data.countdown + 's';

        // HISTORY
        const historyData = await fetchJSON(HISTORY_API);

        const list = historyData.data.list;

        const latest = list[0];

        const latestNumber = parseInt(latest.number);

        const latestResult = convertBigSmall(latestNumber);

        document.getElementById('latestNumber').innerText = latestNumber;

        document.getElementById('latestResult').innerText = latestResult;

        // HISTORY UI
        const historyDiv = document.getElementById('history');

        historyDiv.innerHTML = '';

        let convertedHistory = [];

        list.slice(0,10).forEach(item=>{

            const num = parseInt(item.number);

            const result = convertBigSmall(num);

            convertedHistory.push(result);

            const div = document.createElement('div');

            div.classList.add('history-item');

            if(result === 'BIG'){
                div.classList.add('history-big');
                div.innerText = 'B';
            }else{
                div.classList.add('history-small');
                div.innerText = 'S';
            }

            historyDiv.appendChild(div);
        });

        // PREDICTION
        const prediction = predict(convertedHistory);

        document.getElementById('prediction').innerText = prediction.signal;

        document.getElementById('confidence').innerText = prediction.confidence;

        const signalBox = document.getElementById('signalBox');

        signalBox.className = 'signal';

        if(prediction.signal === 'BIG'){
            signalBox.classList.add('big');
        }else{
            signalBox.classList.add('small');
        }

        setStatus('LIVE CONNECTED');

    }catch(error){

        console.log(error);

        setStatus('API BLOCKED OR CORS ERROR');
    }
}

loadData();

setInterval(loadData,2000);

</script>

</body>
</html>
