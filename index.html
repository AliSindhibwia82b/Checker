<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wingo Signal</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#08122f;
color:white;
padding:15px;
}

.card{
background:#1c2942;
padding:20px;
border-radius:20px;
margin-bottom:15px;
}

.title{
text-align:center;
font-size:42px;
font-weight:bold;
}

.live{
text-align:center;
font-size:28px;
color:#00ff66;
margin:15px 0;
}

.row{
display:flex;
justify-content:space-between;
margin:12px 0;
font-size:24px;
}

.signal{
padding:25px;
margin-top:20px;
border-radius:20px;
text-align:center;
}

.big{
background:#16a34a;
}

.small{
background:#dc2626;
}

.signalText{
font-size:70px;
font-weight:bold;
margin-top:10px;
}

.history{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:20px;
}

.item{
width:55px;
height:55px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
font-weight:bold;
}

.green{
background:#16a34a;
}

.red{
background:#dc2626;
}

.status{
text-align:center;
margin-top:20px;
font-size:20px;
color:#94a3b8;
}
</style>
</head>
<body>

<div class="card">

<div class="title">🤭 developer by ALI SINDHI 😆</div>
<div class="live">● LIVE</div>

<div class="row">
<span>Issue:</span>
<span id="issue">...</span>
</div>

<div class="row">
<span>Countdown:</span>
<span id="countdown">0</span>
</div>

<div class="row">
<span>Latest:</span>
<span id="latest">-</span>
</div>

<div id="signalBox" class="signal big">
<div>NEXT SIGNAL</div>
<div class="signalText" id="predict">BIG</div>
</div>

</div>

<div class="card">
<h1>History</h1>
<div class="history" id="history"></div>
</div>

<div style="text-align:center;margin-top:20px;">
<button id="startBtn" style="
background:#00ff66;
color:black;
padding:15px 30px;
border:none;
border-radius:15px;
font-size:24px;
font-weight:bold;
">START SIGNAL</button>
</div>

<div class="status" id="status">
CONNECTING...
</div>

<!-- FLOATING POPUP -->
<div id="popup" style="
display:none;
position:fixed;
top:100px;
left:30px;
background:#1c2942;
padding:20px;
border-radius:20px;
z-index:9999;
width:220px;
box-shadow:0 0 20px rgba(0,0,0,0.5);
cursor:move;
">

<div style="font-size:20px;font-weight:bold;text-align:center;">
🔥 LIVE SIGNAL
</div>

<div id="popupSignal" style="
margin-top:15px;
font-size:45px;
font-weight:bold;
text-align:center;
color:#00ff66;
">
BIG
</div>

<div id="popupIssue" style="
margin-top:10px;
text-align:center;
font-size:18px;
">
Issue
</div>

</div>

<script>

let historyData = [];
let previousIssue = '';

function getBigSmall(number){
return number >= 5 ? 'BIG' : 'SMALL';
}

function addHistory(result){

historyData.unshift(result);

if(historyData.length > 10){
historyData.pop();
}

const historyDiv = document.getElementById('history');

historyDiv.innerHTML = '';

historyData.forEach(x=>{

const div = document.createElement('div');

div.classList.add('item');

if(x === 'BIG'){
div.classList.add('green');
div.innerText = 'B';
}else{
div.classList.add('red');
div.innerText = 'S';
}

historyDiv.appendChild(div);
});
}

function predict(){

let big = 0;
let small = 0;

historyData.slice(0,3).forEach(x=>{
if(x === 'BIG') big++;
else small++;
});

if(big >= 2) return 'SMALL';
if(small >= 2) return 'BIG';

// fallback logic

if(historyData[0] === 'BIG'){
return 'SMALL';
}

return 'BIG';
}

async function load(){

try{

const response = await fetch('/api/issue');

const data = await response.json();

const issue = data.data.issueNumber;
const countdown = data.data.countdown;

// UPDATE ISSUE

document.getElementById('issue').innerText = issue;
document.getElementById('countdown').innerText = countdown + 's';

// NEW ROUND

if(issue !== previousIssue){

previousIssue = issue;

// REAL HISTORY BASED RESULT

const currentNumber = parseInt(issue.slice(-1));

const latest = getBigSmall(currentNumber);

addHistory(latest);

const nextSignal = predict();

// LATEST

document.getElementById('latest').innerText = latest;

// POPUP UPDATE

document.getElementById('popupSignal').innerText = nextSignal;
document.getElementById('popupIssue').innerText = issue;

// SIGNAL

const predictText = document.getElementById('predict');
predictText.innerText = nextSignal;

const signalBox = document.getElementById('signalBox');

signalBox.className = 'signal';

if(nextSignal === 'BIG'){
signalBox.classList.add('big');
}else{
signalBox.classList.add('small');
}
}

// STATUS

document.getElementById('status').innerText = 'LIVE CONNECTED';

}catch(e){

console.log(e);

document.getElementById('status').innerText = 'SERVER ERROR';
}
}

// START BUTTON

document.getElementById('startBtn').onclick = ()=>{

const popup = document.getElementById('popup');

if(popup.style.display === 'none'){
popup.style.display = 'block';
}else{
popup.style.display = 'none';
}
};

// DRAG POPUP

const popup = document.getElementById('popup');

let isDragging = false;
let offsetX, offsetY;

popup.addEventListener('touchstart', (e)=>{

isDragging = true;

offsetX = e.touches[0].clientX - popup.offsetLeft;
offsetY = e.touches[0].clientY - popup.offsetTop;
});

document.addEventListener('touchmove', (e)=>{

if(!isDragging) return;

popup.style.left =
(e.touches[0].clientX - offsetX) + 'px';

popup.style.top =
(e.touches[0].clientY - offsetY) + 'px';
});

document.addEventListener('touchend', ()=>{
isDragging = false;
});

load();

setInterval(load,1000);

</script>

</body>
</html>
