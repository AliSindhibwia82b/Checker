<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WINGO SIGNAL PANEL</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#08122f;
color:white;
padding:15px;
}

.card{
background:#1c2942;
padding:20px;
border-radius:20px;
margin-bottom:15px;
}

.title{
text-align:center;
font-size:38px;
font-weight:bold;
}

.live{
text-align:center;
font-size:24px;
color:#00ff66;
margin:15px 0;
}

.row{
display:flex;
justify-content:space-between;
margin:12px 0;
font-size:22px;
}

.signal{
padding:25px;
border-radius:20px;
text-align:center;
margin-top:20px;
}

.big{
background:#16a34a;
}

.small{
background:#dc2626;
}

.signalText{
font-size:70px;
font-weight:bold;
}

.counter{
font-size:30px;
margin-top:10px;
font-weight:bold;
}

.buttons{
display:flex;
gap:15px;
margin-top:20px;
}

.btn{
flex:1;
padding:18px;
border:none;
border-radius:15px;
font-size:24px;
font-weight:bold;
color:white;
}

.bigBtn{
background:#16a34a;
}

.smallBtn{
background:#dc2626;
}

.history{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:20px;
}

.item{
width:50px;
height:50px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:bold;
}

.green{
background:#16a34a;
}

.red{
background:#dc2626;
}

.status{
text-align:center;
margin-top:15px;
font-size:18px;
color:#94a3b8;
}

.startBtn{
width:100%;
padding:18px;
font-size:24px;
font-weight:bold;
border:none;
border-radius:15px;
background:#00ff66;
color:black;
margin-top:15px;
}

#popup{
display:none;
position:fixed;
top:120px;
left:20px;
background:#1c2942;
padding:20px;
border-radius:20px;
width:220px;
z-index:9999;
cursor:move;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.popupTitle{
text-align:center;
font-size:22px;
font-weight:bold;
}

.popupSignal{
text-align:center;
font-size:55px;
font-weight:bold;
margin-top:10px;
}

.popupCounter{
text-align:center;
font-size:28px;
margin-top:10px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="card">

<div class="title">
🔥 WINGO SIGNAL
</div>

<div class="live">
● LIVE
</div>

<div class="row">
<span>Current Signal:</span>
<span id="predict">BIG</span>
</div>

<div class="row">
<span>Counter:</span>
<span id="counterText">BIG 1</span>
</div>

<div id="signalBox" class="signal big">

<div>
NEXT SIGNAL
</div>

<div class="signalText" id="mainSignal">
BIG
</div>

</div>

<!-- BUTTONS -->

<div class="buttons">

<button class="btn bigBtn"
onclick="enterResult('BIG')">
BIG
</button>

<button class="btn smallBtn"
onclick="enterResult('SMALL')">
SMALL
</button>

</div>

<button class="startBtn"
id="startBtn">
START POPUP
</button>

</div>

<!-- HISTORY -->

<div class="card">

<h2>History</h2>

<div class="history"
id="history">
</div>

</div>

<div class="status"
id="status">
READY
</div>

<!-- POPUP -->

<div id="popup">

<div class="popupTitle">
🔥 LIVE SIGNAL
</div>

<div class="popupSignal"
id="popupSignal">
BIG
</div>

<div class="popupCounter"
id="popupCounter">
BIG 1
</div>

</div>

<script>

// ===== DATA =====

let historyData = [];

let currentSignal = 'BIG';

let signalCount = 1;

// ===== HISTORY =====

function addHistory(result){

historyData.unshift(result);

if(historyData.length > 10){
historyData.pop();
}

const history =
document.getElementById('history');

history.innerHTML = '';

historyData.forEach(x=>{

const div =
document.createElement('div');

div.classList.add('item');

if(x === 'BIG'){

div.classList.add('green');
div.innerText = 'B';

}else{

div.classList.add('red');
div.innerText = 'S';

}

history.appendChild(div);

});

}

// ===== PREDICTION =====

function getNextSignal(){

const last3 =
historyData.slice(0,3);

const big =
last3.filter(x=>x==='BIG').length;

const small =
last3.filter(x=>x==='SMALL').length;

// BBB -> SMALL

if(big >= 2){
return 'SMALL';
}

// SSS -> BIG

if(small >= 2){
return 'BIG';
}

// ALTERNATE

if(historyData[0] === 'BIG'){
return 'SMALL';
}

return 'BIG';

}

// ===== UPDATE SIGNAL =====

function updateSignal(nextSignal){

// SAME SIGNAL

if(nextSignal === currentSignal){

signalCount++;

if(signalCount > 5){
signalCount = 1;
}

}else{

currentSignal = nextSignal;

signalCount = 1;

}

// TEXT

const counter =
nextSignal + ' ' + signalCount;

// MAIN

document.getElementById('predict')
.innerText = nextSignal;

document.getElementById('mainSignal')
.innerText = nextSignal;

document.getElementById('counterText')
.innerText = counter;

// POPUP

document.getElementById('popupSignal')
.innerText = nextSignal;

document.getElementById('popupCounter')
.innerText = counter;

// COLOR

const signalBox =
document.getElementById('signalBox');

signalBox.className = 'signal';

if(nextSignal === 'BIG'){

signalBox.classList.add('big');

}else{

signalBox.classList.add('small');

}

}

// ===== BUTTON CLICK =====

function enterResult(result){

// SAVE REAL RESULT

addHistory(result);

// GET NEXT SIGNAL

const nextSignal =
getNextSignal();

// UPDATE

updateSignal(nextSignal);

// STATUS

document.getElementById('status')
.innerText =
'LAST RESULT: ' + result;

}

// ===== POPUP =====

document.getElementById('startBtn')
.onclick = ()=>{

const popup =
document.getElementById('popup');

if(popup.style.display === 'none'){

popup.style.display = 'block';

}else{

popup.style.display = 'none';

}

};

// ===== DRAG =====

const popup =
document.getElementById('popup');

let isDragging = false;

let offsetX, offsetY;

popup.addEventListener('touchstart',(e)=>{

isDragging = true;

offsetX =
e.touches[0].clientX -
popup.offsetLeft;

offsetY =
e.touches[0].clientY -
popup.offsetTop;

});

document.addEventListener('touchmove',(e)=>{

if(!isDragging) return;

popup.style.left =
(e.touches[0].clientX - offsetX)
+ 'px';

popup.style.top =
(e.touches[0].clientY - offsetY)
+ 'px';

});

document.addEventListener('touchend',()=>{

isDragging = false;

});

// ===== START =====

updateSignal('BIG');

</script>

</body>
</html>
