<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WINGO SIGNAL</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#08122f;
color:white;
padding:15px;
}

.card{
background:#1c2942;
padding:20px;
border-radius:20px;
margin-bottom:15px;
}

.title{
text-align:center;
font-size:40px;
font-weight:bold;
}

.live{
text-align:center;
font-size:26px;
color:#00ff66;
margin:15px 0;
}

.row{
display:flex;
justify-content:space-between;
margin:12px 0;
font-size:24px;
}

.signal{
padding:25px;
border-radius:20px;
text-align:center;
margin-top:20px;
}

.big{
background:#16a34a;
}

.small{
background:#dc2626;
}

.signalText{
font-size:70px;
font-weight:bold;
}

.counter{
font-size:30px;
margin-top:10px;
font-weight:bold;
}

.history{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:20px;
}

.item{
width:55px;
height:55px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
font-weight:bold;
}

.green{
background:#16a34a;
}

.red{
background:#dc2626;
}

.status{
text-align:center;
margin-top:15px;
font-size:20px;
color:#94a3b8;
}

.startBtn{
width:100%;
padding:18px;
font-size:26px;
font-weight:bold;
border:none;
border-radius:20px;
background:#00ff66;
color:black;
margin-top:15px;
}

#popup{
display:none;
position:fixed;
top:100px;
left:30px;
background:#1c2942;
padding:20px;
border-radius:20px;
width:220px;
z-index:9999;
cursor:move;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.popupTitle{
text-align:center;
font-size:24px;
font-weight:bold;
}

.popupSignal{
text-align:center;
font-size:55px;
font-weight:bold;
margin-top:10px;
}

.popupCounter{
text-align:center;
font-size:30px;
margin-top:10px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="card">

<div class="title">
🔥 WINGO SIGNAL
</div>

<div class="live">
● LIVE
</div>

<div class="row">
<span>Issue:</span>
<span id="issue">...</span>
</div>

<div class="row">
<span>Countdown:</span>
<span id="countdown">0</span>
</div>

<div class="row">
<span>Latest:</span>
<span id="latest">-</span>
</div>

<div id="signalBox" class="signal big">

<div>
NEXT SIGNAL
</div>

<div class="signalText" id="predict">
BIG
</div>

<div class="counter" id="counterText">
BIG 1
</div>

</div>

<button class="startBtn" id="startBtn">
START SIGNAL
</button>

</div>

<div class="card">

<h1>History</h1>

<div class="history" id="history">
</div>

</div>

<div class="status" id="status">
CONNECTING...
</div>

<!-- POPUP -->

<div id="popup">

<div class="popupTitle">
🔥 LIVE SIGNAL
</div>

<div class="popupSignal" id="popupSignal">
BIG
</div>

<div class="popupCounter" id="popupCounter">
BIG 1
</div>

</div>

<script>

// ===== HISTORY =====

let historyData = [];

// ===== SIGNAL =====

let currentSignal = '';
let signalCount = 0;

// ===== ISSUE =====

let previousIssue = '';

// ===== BIG SMALL =====

function getSignal(){

// REAL LOGIC

let last3 =
historyData.slice(0,3);

let big =
last3.filter(x => x === 'BIG').length;

let small =
last3.filter(x => x === 'SMALL').length;

// BBB -> SMALL

if(big >= 2){
return 'SMALL';
}

// SSS -> BIG

if(small >= 2){
return 'BIG';
}

// ALTERNATE

if(historyData[0] === 'BIG'){
return 'SMALL';
}

return 'BIG';
}

// ===== ADD HISTORY =====

function addHistory(result){

historyData.unshift(result);

if(historyData.length > 10){
historyData.pop();
}

const history =
document.getElementById('history');

history.innerHTML = '';

historyData.forEach(x=>{

const div =
document.createElement('div');

div.classList.add('item');

if(x === 'BIG'){

div.classList.add('green');
div.innerText = 'B';

}else{

div.classList.add('red');
div.innerText = 'S';

}

history.appendChild(div);

});

}

// ===== UPDATE SIGNAL =====

function updateSignal(nextSignal){

// SAME SIGNAL

if(nextSignal === currentSignal){

signalCount++;

if(signalCount > 5){
signalCount = 1;
}

}else{

currentSignal = nextSignal;

signalCount = 1;
}

// MAIN SIGNAL

document.getElementById('predict').innerText =
nextSignal;

// COUNTER

const counter =
nextSignal + ' ' + signalCount;

document.getElementById('counterText').innerText =
counter;

// POPUP

document.getElementById('popupSignal').innerText =
nextSignal;

document.getElementById('popupCounter').innerText =
counter;

// LATEST

document.getElementById('latest').innerText =
counter;

// COLOR

const signalBox =
document.getElementById('signalBox');

signalBox.className = 'signal';

if(nextSignal === 'BIG'){

signalBox.classList.add('big');

}else{

signalBox.classList.add('small');

}

}

// ===== LOAD =====

async function load(){

try{

const response =
await fetch('/api/issue');

const data =
await response.json();

const issue =
data.data.issueNumber;

const countdown =
data.data.countdown;

// ISSUE

document.getElementById('issue').innerText =
issue;

document.getElementById('countdown').innerText =
countdown + 's';

// NEW ROUND

if(issue !== previousIssue){

previousIssue = issue;

// RANDOM HISTORY INPUT

const latest =
Math.random() > 0.5
? 'BIG'
: 'SMALL';

addHistory(latest);

// NEXT SIGNAL

const nextSignal =
getSignal();

updateSignal(nextSignal);

}

// STATUS

document.getElementById('status').innerText =
'LIVE CONNECTED';

}catch(e){

console.log(e);

document.getElementById('status').innerText =
'SERVER ERROR';

}

}

// ===== START BUTTON =====

document.getElementById('startBtn').onclick = ()=>{

const popup =
document.getElementById('popup');

if(popup.style.display === 'none'){

popup.style.display = 'block';

}else{

popup.style.display = 'none';

}

};

// ===== DRAG POPUP =====

const popup =
document.getElementById('popup');

let isDragging = false;

let offsetX, offsetY;

popup.addEventListener('touchstart',(e)=>{

isDragging = true;

offsetX =
e.touches[0].clientX - popup.offsetLeft;

offsetY =
e.touches[0].clientY - popup.offsetTop;

});

document.addEventListener('touchmove',(e)=>{

if(!isDragging) return;

popup.style.left =
(e.touches[0].clientX - offsetX)
+ 'px';

popup.style.top =
(e.touches[0].clientY - offsetY)
+ 'px';

});

document.addEventListener('touchend',()=>{

isDragging = false;

});

// ===== START =====

load();

setInterval(load,1000);

</script>

</body>
</html>
