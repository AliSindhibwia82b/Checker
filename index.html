<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REAL WINGO LIVE PANEL</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#08122f;
color:white;
padding:15px;
}

.card{
background:#1c2942;
padding:20px;
border-radius:20px;
margin-bottom:15px;
}

.title{
text-align:center;
font-size:38px;
font-weight:bold;
}

.live{
text-align:center;
font-size:22px;
color:#00ff66;
margin:10px 0;
}

.row{
display:flex;
justify-content:space-between;
margin:12px 0;
font-size:22px;
}

.signal{
padding:25px;
border-radius:20px;
text-align:center;
margin-top:20px;
}

.big{
background:#16a34a;
}

.small{
background:#dc2626;
}

.signalText{
font-size:70px;
font-weight:bold;
}

.number{
font-size:35px;
margin-top:10px;
}

.history{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:20px;
}

.item{
width:55px;
height:55px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
font-weight:bold;
}

.green{
background:#16a34a;
}

.red{
background:#dc2626;
}

.status{
text-align:center;
margin-top:15px;
font-size:18px;
color:#94a3b8;
}

</style>
</head>

<body>

<div class="card">

<div class="title">
🔥 REAL WINGO LIVE
</div>

<div class="live">
● LIVE SIGNAL
</div>

<div class="row">
<span>Issue:</span>
<span id="issue">...</span>
</div>

<div class="row">
<span>Countdown:</span>
<span id="countdown">0</span>
</div>

<div class="row">
<span>Number:</span>
<span id="number">0</span>
</div>

<div id="signalBox" class="signal big">

<div>
LIVE RESULT
</div>

<div class="signalText" id="signal">
BIG
</div>

<div class="number" id="signalNumber">
5
</div>

</div>

</div>

<div class="card">

<h2>Live History</h2>

<div class="history" id="history">
</div>

</div>

<div class="status" id="status">
CONNECTING...
</div>

<script>

// ===== API =====

const ISSUE_API =
'https://pakclub10.com/webapi/kv/issue/WinGo_30S';

const HISTORY_API =
'https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json';

// ===== LAST ISSUE =====

let lastIssue = '';

// ===== BIG SMALL =====

function getBigSmall(number){

number = parseInt(number);

if(number >= 5){
return 'BIG';
}

return 'SMALL';

}

// ===== UPDATE UI =====

function updateUI(number, signal){

document.getElementById('number')
.innerText = number;

document.getElementById('signal')
.innerText = signal;

document.getElementById('signalNumber')
.innerText = number;

// COLOR

const signalBox =
document.getElementById('signalBox');

signalBox.className = 'signal';

if(signal === 'BIG'){

signalBox.classList.add('big');

}else{

signalBox.classList.add('small');

}

}

// ===== HISTORY =====

function updateHistory(list){

const history =
document.getElementById('history');

history.innerHTML = '';

list.forEach(item=>{

const number =
parseInt(item.number);

const signal =
getBigSmall(number);

const div =
document.createElement('div');

div.classList.add('item');

if(signal === 'BIG'){

div.classList.add('green');

}else{

div.classList.add('red');

}

div.innerText = number;

history.appendChild(div);

});

}

// ===== LOAD =====

async function loadData(){

try{

// ISSUE API

const issueRes =
await fetch(ISSUE_API);

const issueData =
await issueRes.json();

const issue =
issueData.data.issueNumber;

const countdown =
issueData.data.countdown;

// UPDATE ISSUE

document.getElementById('issue')
.innerText = issue;

document.getElementById('countdown')
.innerText = countdown + 's';

// NEW ISSUE

if(issue !== lastIssue){

lastIssue = issue;

// HISTORY API

const historyRes =
await fetch(HISTORY_API);

const historyData =
await historyRes.json();

const list =
historyData.data.list;

// LATEST

const latest =
list[0];

const number =
latest.number;

const signal =
getBigSmall(number);

// UPDATE UI

updateUI(number, signal);

// UPDATE HISTORY

updateHistory(list);

// STATUS

document.getElementById('status')
.innerText =
'LIVE CONNECTED';

}

}catch(e){

console.log(e);

document.getElementById('status')
.innerText =
'SERVER ERROR';

}

}

// ===== START =====

loadData();

setInterval(loadData,2000);

</script>

</body>
</html>
